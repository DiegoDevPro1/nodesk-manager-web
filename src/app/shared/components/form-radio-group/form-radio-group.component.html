<div class="flex flex-col gap-2">
  <label class="text-sm font-medium text-slate-700">
    {{ label }}
  </label>

  <div
    class="flex flex-wrap gap-2"
    [ngClass]="direction === 'column' ? 'flex-col' : 'flex-row'"
  >
    @for (option of options; track option.value) {
      <label
        class="inline-flex cursor-pointer items-center gap-2 rounded-xl border px-3 py-2 text-sm transition"
        [ngClass]="
          option.value === value
            ? 'border-blue-500 bg-blue-50 text-blue-700'
            : 'border-slate-200 bg-white text-slate-700 hover:border-blue-200 hover:bg-slate-50'
        "
      >
        <input
          type="radio"
          class="h-4 w-4 border-slate-300 text-blue-600 focus:ring-blue-500"
          [checked]="option.value === value"
          (change)="onSelect(option.value)"
        />

        <span class="flex flex-col">
          <span class="font-medium">
            {{ option.label }}
          </span>

          @if (option.description) {
            <span class="text-xs text-slate-400">
              {{ option.description }}
            </span>
          }
        </span>
      </label>
    }
  </div>

  @if (error) {
    <p class="text-xs text-rose-500">
      {{ error }}
    </p>
  }
</div>
