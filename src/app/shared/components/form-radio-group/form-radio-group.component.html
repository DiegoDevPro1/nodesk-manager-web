<div class="form-radio-group">
  <label class="form-radio-group__label">
    <span>{{ label }}</span>
    @if (required) {
      <span class="form-radio-group__required">Obligatorio</span>
    }
  </label>

  <div class="form-radio-group__options">
    @for (option of options; track option.value) {
      <label
        class="form-radio-group__option"
        [class.form-radio-group__option--checked]="option.value === (value ?? '')"
        [class.form-radio-group__option--disabled]="disabled"
      >
        <input
          class="form-radio-group__input"
          type="radio"
          [name]="name"
          [value]="option.value"
          [checked]="option.value === (value ?? '')"
          [disabled]="disabled"
          (change)="onChange(option.value)"
        />
        <span class="form-radio-group__control"></span>
        <span class="form-radio-group__content">
          <span class="form-radio-group__option-label">{{ option.label }}</span>
          @if (option.description) {
            <span class="form-radio-group__option-description">{{ option.description }}</span>
          }
        </span>
      </label>
    }
  </div>

  @if (hint && !error) {
    <p class="form-radio-group__hint">
      {{ hint }}
    </p>
  }

  @if (error) {
    <p class="form-radio-group__error">
      {{ error }}
    </p>
  }
</div>
