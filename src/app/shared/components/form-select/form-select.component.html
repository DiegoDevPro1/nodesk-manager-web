<div class="flex flex-col gap-1.5">
  <label class="flex items-center justify-between text-sm font-medium text-slate-700">
    <span>{{ label }}</span>
    @if (required) {
      <span
        class="text-[0.7rem] font-semibold uppercase tracking-wide text-rose-500"
      >
        Obligatorio
      </span>
    }
  </label>

  <select
    class="block w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100 disabled:cursor-not-allowed disabled:bg-slate-50 disabled:text-slate-400"
    [disabled]="disabled"
    [value]="value ?? ''"
    (change)="onChange($any($event.target).value)"
  >
    @if (placeholder) {
      <option value="" [selected]="(value ?? '') === ''">
        {{ placeholder }}
      </option>
    }

    @for (option of options; track option.value) {
      <option [value]="option.value" [selected]="option.value === (value ?? '')">
        {{ option.label }}
      </option>
    }
  </select>

  @if (hint && !error) {
    <p class="text-xs text-slate-400">
      {{ hint }}
    </p>
  }

  @if (error) {
    <p class="text-xs text-rose-500">
      {{ error }}
    </p>
  }
</div>
