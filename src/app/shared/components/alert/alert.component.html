<article
  class="flex w-full items-start gap-4 overflow-hidden rounded-2xl border border-slate-200 bg-white p-4 shadow-lg shadow-slate-900/5 ring-1 ring-black/5"
  [ngClass]="theme.borderClass"
>
  <div
    class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full"
    [ngClass]="theme.iconBgClass"
  >
    @switch (alert.type) {
      @case ('success') {
        <svg
          class="h-5 w-5"
          [ngClass]="theme.iconClass"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.857a.75.75 0 0 0-1.214-.886l-3.31 4.538-1.976-1.977a.75.75 0 1 0-1.06 1.061l2.6 2.6a.75.75 0 0 0 1.137-.09l3.823-5.246Z"
            clip-rule="evenodd"
          />
        </svg>
      }
      @case ('warning') {
        <svg
          class="h-5 w-5"
          [ngClass]="theme.iconClass"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M8.257 3.099c.765-1.36 2.72-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.981-1.742 2.981H4.419c-1.53 0-2.492-1.647-1.742-2.98l5.58-9.921ZM11 7a1 1 0 1 0-2 0v3a1 1 0 1 0 2 0V7Zm-1 7a1.25 1.25 0 1 0 0-2.5A1.25 1.25 0 0 0 10 14Z"
            clip-rule="evenodd"
          />
        </svg>
      }
      @case ('error') {
        <svg
          class="h-5 w-5"
          [ngClass]="theme.iconClass"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.22 7.22a.75.75 0 0 1 1.06 0L10 7.94l.72-.72a.75.75 0 1 1 1.06 1.06l-.72.72.72.72a.75.75 0 0 1-1.06 1.06L10 10.06l-.72.72a.75.75 0 1 1-1.06-1.06l.72-.72-.72-.72a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"
          />
        </svg>
      }
      @default {
        <svg
          class="h-5 w-5"
          [ngClass]="theme.iconClass"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true"
        >
          <path
            fill-rule="evenodd"
            d="M18 10A8 8 0 1 1 2 10a8 8 0 0 1 16 0Zm-7-4a1 1 0 1 0-2 0 1 1 0 0 0 2 0Zm-2 3a1 1 0 1 0 0 2v3a1 1 0 1 0 2 0V9a1 1 0 1 0-2 0Z"
            clip-rule="evenodd"
          />
        </svg>
      }
    }
  </div>

  <div class="min-w-0 flex-1">
    <h3 class="text-sm font-semibold text-slate-900">{{ alert.title }}</h3>
    <p class="mt-1 text-sm leading-5 text-slate-500">{{ alert.message }}</p>
  </div>

  @if (alert.closable) {
    <button
      type="button"
      class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
      (click)="onClose()"
      aria-label="Cerrar alerta"
    >
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M4.22 4.22a.75.75 0 0 1 1.06 0L10 8.94l4.72-4.72a.75.75 0 1 1 1.06 1.06L11.06 10l4.72 4.72a.75.75 0 1 1-1.06 1.06L10 11.06l-4.72 4.72a.75.75 0 1 1-1.06-1.06L8.94 10 4.22 5.28a.75.75 0 0 1 0-1.06Z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  }
</article>
