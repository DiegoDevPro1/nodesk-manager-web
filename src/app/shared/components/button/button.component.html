<button
  [type]="type"
  [disabled]="disabled"
  class="inline-flex items-center justify-center rounded-xl font-semibold transition focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
  [ngClass]="[
    size === 'sm' ? 'px-3 py-1.5 text-xs' : 'px-4 py-2.5 text-sm min-h-11',
    fullWidth ? 'w-full' : '',
    variant === 'primary'
      ? 'bg-blue-600 text-white shadow-sm hover:bg-blue-700 focus-visible:outline-blue-600'
      : '',
    variant === 'outline'
      ? 'border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 focus-visible:outline-slate-300'
      : '',
    variant === 'ghost' ? 'text-slate-700 hover:bg-slate-100 focus-visible:outline-slate-300' : '',
    variant === 'danger'
      ? 'bg-rose-600 text-white shadow-sm hover:bg-rose-700 focus-visible:outline-rose-600'
      : '',
  ]"
>
  <ng-content />
</button>
