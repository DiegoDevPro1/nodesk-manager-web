<article class="metric-card" [ngClass]="'metric-card--' + accent">
  <div class="metric-card__accent"></div>
  <div class="metric-card__header">
    <div class="metric-card__icon" *ngIf="icon">
      <lucide-icon [img]="icon" [size]="22" [strokeWidth]="2.1" />
    </div>

    <h2 class="metric-card__title">
      {{ title }}
    </h2>
  </div>

  <div class="metric-card__value">
    {{ value }}
  </div>

  <div class="metric-card__footer">
    <p class="metric-card__hint" *ngIf="hint">
      {{ hint }}
    </p>

    <p class="metric-card__trend" *ngIf="trendLabel">
      <span
        class="metric-card__trend-pill"
        [ngClass]="{
          'metric-card__trend-pill--up': trendType === 'up',
          'metric-card__trend-pill--down': trendType === 'down',
        }"
      >
        {{ trendLabel }}
      </span>
    </p>
  </div>
</article>
