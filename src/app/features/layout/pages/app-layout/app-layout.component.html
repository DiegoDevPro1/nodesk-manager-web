<div class="app-layout">
  <app-layout-sidenav />

  <div class="app-layout__content">
    <ng-container *ngIf="header$ | async as header">
      <app-page-header [title]="header.title" [subtitle]="header.subtitle" [icon]="header.icon" />
    </ng-container>

    <main class="app-layout__body">
      <router-outlet />
    </main>
  </div>

  <app-confirm-modal-host />
</div>
